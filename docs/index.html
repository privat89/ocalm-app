<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCALM - Transactions Sécurisées</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
  body { background:#F5F7FA; color:#1A1A2E; min-height:100vh; }
  .container { max-width:480px; margin:0 auto; padding:20px; }
  .header { text-align:center; padding:40px 20px; }
  .header h1 { color:#0066FF; font-size:32px; margin-bottom:8px; }
  .header p { color:#8B8B9E; font-size:16px; }
  .card { background:#fff; border-radius:16px; padding:24px; margin-bottom:16px; box-shadow:0 2px 8px rgba(0,0,0,0.04); }
  .card h2 { font-size:18px; margin-bottom:16px; color:#1A1A2E; }
  .input-group { display:flex; gap:8px; margin-bottom:12px; }
  .input-group .prefix { padding:14px 12px; background:#F5F7FA; border-radius:12px; font-weight:500; display:flex; align-items:center; }
  input, textarea { flex:1; padding:14px 16px; border:1.5px solid #E8E8F0; border-radius:12px; font-size:15px; outline:none; }
  input:focus, textarea:focus { border-color:#0066FF; }
  button { width:100%; padding:14px; border:none; border-radius:12px; font-size:15px; font-weight:600; cursor:pointer; background:#0066FF; color:#fff; }
  button:hover { opacity:0.9; }
  .result { margin-top:12px; padding:12px; border-radius:8px; font-size:14px; }
  .result.success { background:rgba(52,199,89,0.1); color:#2E7D32; }
  .result.error { background:rgba(255,59,48,0.1); color:#C62828; }
  .result.info { background:rgba(0,102,255,0.08); color:#0066FF; }
  .hidden { display:none; }
  .nav { display:flex; gap:8px; margin-bottom:16px; }
  .nav button { flex:1; background:#F5F7FA; color:#1A1A2E; }
  .nav button.active { background:#0066FF; color:#fff; }
  .status { text-align:center; padding:8px; border-radius:8px; font-size:13px; margin-bottom:16px; }
  .status.online { background:rgba(52,199,89,0.1); color:#2E7D32; }
  .status.offline { background:rgba(255,59,48,0.1); color:#C62828; }
  .transaction-item { padding:12px; border-bottom:1px solid #E8E8F0; }
  .transaction-item:last-child { border-bottom:none; }
  .badge { display:inline-block; padding:4px 10px; border-radius:20px; font-size:11px; font-weight:600; }
  .badge-en_attente { background:#FFF3E0; color:#E65100; }
  .badge-en_cours { background:#E3F2FD; color:#1565C0; }
  .badge-termine { background:#E8F5E9; color:#2E7D32; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>🔷 OCALM</h1>
    <p>Transactions sécurisées entre particuliers</p>
  </div>

  <div id="backend-status" class="status offline">Vérification du backend...</div>

  <!-- Navigation -->
  <div class="nav">
    <button class="active" onclick="showPage('login')">Connexion</button>
    <button onclick="showPage('dashboard')">Tableau de bord</button>
  </div>

  <!-- PAGE: Login -->
  <div id="page-login" class="page">
    <div class="card">
      <h2>Se connecter</h2>
      <div class="input-group">
        <div class="prefix">+225</div>
        <input type="tel" id="phone" placeholder="07 XX XX XX XX" maxlength="10" value="0789782921">
      </div>
      <button onclick="sendOtp()">Recevoir le code OTP</button>
      <div id="otp-result" class="result hidden"></div>
      
      <div id="verify-section" class="hidden" style="margin-top:16px;">
        <input type="text" id="otp-code" placeholder="Code OTP à 6 chiffres" maxlength="6">
        <button onclick="verifyOtp()" style="margin-top:8px;">Vérifier le code</button>
      </div>
    </div>
  </div>

  <!-- PAGE: Dashboard -->
  <div id="page-dashboard" class="page hidden">
    <div class="card">
      <h2>Nouvelle Transaction</h2>
      <input type="text" id="vendeur" placeholder="Numéro du vendeur">
      <input type="number" id="montant" placeholder="Montant (FCFA)" style="margin-top:8px;">
      <textarea id="desc" placeholder="Description" rows="2" style="margin-top:8px; resize:none;"></textarea>
      <button onclick="createTransaction()" style="margin-top:8px;">Créer la transaction</button>
      <div id="tx-result" class="result hidden"></div>
    </div>

    <div class="card">
      <h2>Mes Transactions</h2>
      <div id="transactions-list"><div style="text-align:center;color:#8B8B9E;padding:20px;">Chargement...</div></div>
    </div>
  </div>

</div>

<script>
const API = 'https://ocalm-backend-s3hx.onrender.com';
let token = localStorage.getItem('token');

// Check backend status
async function checkStatus() {
  try {
    const res = await fetch(API + '/health');
    const el = document.getElementById('backend-status');
    if (res.ok) {
      el.textContent = '🟢 Backend en ligne';
      el.className = 'status online';
    } else {
      el.textContent = '🔴 Backend indisponible';
      el.className = 'status offline';
    }
  } catch (e) {
    document.getElementById('backend-status').textContent = '🔴 Backend injoignable - Problème réseau';
    document.getElementById('backend-status').className = 'status offline';
  }
}
checkStatus();

function showResult(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'result ' + type;
  el.classList.remove('hidden');
}

function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
  document.getElementById('page-' + page).classList.remove('hidden');
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

async function api(endpoint, opts = {}) {
  try {
    const res = await fetch(API + endpoint, {
      method: opts.method || 'GET',
      headers: { 'Content-Type': 'application/json', ...(token && { 'Authorization': 'Bearer ' + token }) },
      body: opts.body ? JSON.stringify(opts.body) : undefined
    });
    const data = await res.json().catch(() => ({}));
    return { ok: res.ok, status: res.status, data };
  } catch (e) {
    return { ok: false, error: e.message };
  }
}

async function sendOtp() {
  const phone = '+225' + document.getElementById('phone').value.replace(/\s/g, '');
  showResult('otp-result', 'Envoi en cours...', 'info');
  
  const res = await api('/auth/send-otp', { method: 'POST', body: { phone } });
  
  if (res.ok && res.data.success) {
    showResult('otp-result', '✅ Code envoyé ! Vérifiez vos SMS.', 'success');
    document.getElementById('verify-section').classList.remove('hidden');
  } else if (res.error) {
    showResult('otp-result', '❌ Impossible de joindre le serveur. Vérifiez votre connexion.', 'error');
  } else {
    showResult('otp-result', '❌ ' + (res.data.message || 'Erreur'), 'error');
  }
}

async function verifyOtp() {
  const phone = '+225' + document.getElementById('phone').value.replace(/\s/g, '');
  const code = document.getElementById('otp-code').value;
  showResult('otp-result', 'Vérification...', 'info');
  
  const res = await api('/auth/verify-otp', { method: 'POST', body: { phone, code } });
  
  if (res.ok && res.data.token) {
    token = res.data.token;
    localStorage.setItem('token', token);
    showResult('otp-result', '✅ Connecté ! Redirection...', 'success');
    setTimeout(() => location.reload(), 1000);
  } else {
    showResult('otp-result', '❌ Code invalide', 'error');
  }
}

async function createTransaction() {
  const body = {
    vendeurPhone: document.getElementById('vendeur').value,
    montant: parseInt(document.getElementById('montant').value),
    description: document.getElementById('desc').value
  };
  showResult('tx-result', 'Création...', 'info');
  
  const res = await api('/escrow/create', { method: 'POST', body });
  
  if (res.ok) {
    showResult('tx-result', '✅ Transaction créée !', 'success');
    loadTransactions();
  } else {
    showResult('tx-result', '❌ ' + (res.data.message || 'Erreur'), 'error');
  }
}

async function loadTransactions() {
  const res = await api('/escrow/my-transactions');
  const list = document.getElementById('transactions-list');
  
  if (!res.ok || !res.data.transactions?.length) {
    list.innerHTML = '<div style="text-align:center;color:#8B8B9E;padding:20px;">Aucune transaction</div>';
    return;
  }
  
  list.innerHTML = res.data.transactions.map(tx => `
    <div class="transaction-item">
      <div style="display:flex;justify-content:space-between;">
        <strong>${tx.description || 'Transaction'}</strong>
        <span>${tx.montant_total?.toLocaleString() || 0} F</span>
      </div>
      <div style="margin-top:4px;">
        <span class="badge badge-${tx.statut || 'en_attente'}">${tx.statut || 'En attente'}</span>
        <span style="color:#8B8B9E;font-size:12px;">${tx.created_at ? new Date(tx.created_at).toLocaleDateString('fr-FR') : ''}</span>
      </div>
    </div>
  `).join('');
}

// Auto-load if logged in
if (token) {
  document.getElementById('page-login').classList.add('hidden');
  document.getElementById('page-dashboard').classList.remove('hidden');
  loadTransactions();
}
</script>

</body>
</html>
