events {
    worker_connections 1024;
}

http {
    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

    upstream auth_service {
        server auth-service:3001;
    }
    upstream wallet_service {
        server wallet-service:3002;
    }
    upstream escrow_service {
        server escrow-service:3003;
    }
    upstream delivery_service {
        server delivery-service:3004;
    }
    upstream dispute_service {
        server dispute-service:3005;
    }
    upstream notification_service {
        server notification-service:3006;
    }

    server {
        listen 80;
        server_name api.ocalm.ci;

        # Security headers
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        add_header X-XSS-Protection "1; mode=block";

        # Health check
        location /health {
            return 200 '{"status":"ok","service":"ocalm-gateway"}';
            add_header Content-Type application/json;
        }

        # Auth Service
        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=3 nodelay;
            proxy_pass http://auth_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Wallet Service
        location /api/v1/wallet/ {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://wallet_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Escrow/Transactions Service
        location /api/v1/transactions/ {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://escrow_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Delivery Service
        location /api/v1/delivery/ {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://delivery_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Dispute Service
        location /api/v1/disputes/ {
            limit_req zone=api_limit burst=5 nodelay;
            proxy_pass http://dispute_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Notification Service
        location /api/v1/notifications/ {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://notification_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Wave Webhook (no rate limit — from Wave servers)
        location /api/v1/webhooks/wave {
            proxy_pass http://wallet_service/webhooks/wave;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
