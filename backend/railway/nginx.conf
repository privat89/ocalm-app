worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    upstream auth { server 127.0.0.1:3001; }
    upstream wallet { server 127.0.0.1:3002; }
    upstream escrow { server 127.0.0.1:3003; }
    upstream delivery { server 127.0.0.1:3004; }
    upstream dispute { server 127.0.0.1:3005; }
    upstream notification { server 127.0.0.1:3006; }

    server {
        listen 3000;
        server_name _;

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        location /auth/ { proxy_pass http://auth/; }
        location /wallet/ { proxy_pass http://wallet/; }
        location /escrow/ { proxy_pass http://escrow/; }
        location /delivery/ { proxy_pass http://delivery/; }
        location /dispute/ { proxy_pass http://dispute/; }
        location /notification/ { proxy_pass http://notification/; }

        location / {
            return 200 'OCALM API Gateway - OK';
            add_header Content-Type text/plain;
        }
    }
}
